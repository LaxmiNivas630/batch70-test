<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Design</title>
<style>
    table {
        border-collapse: collapse;
        width: 70%;
        margin: 20px auto;
        font-family: Arial, sans-serif;
        font-size: 22px;
        text-align: left;
    }

    th, td {
        border: 1px solid #000;
        padding: 10px 15px;
    }

    th {
        background-color: #ffc100; /* yellow header */
        color: #000;
        font-weight: bold;
    }

    tr.green {
        background-color: #00b050; /* green rows */
        color: #000;
    }
</style>
</head>
<body>

<table>
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Points</th>
    </tr>
    <tr class="green">
        <td>Jill</td>
        <td>Smith</td>
        <td>50</td>
    </tr>
    <tr>
        <td>Eve</td>
        <td>Jackson</td>
        <td>94</td>
    </tr>
    <tr class="green">
        <td>Adam</td>
        <td>Johnson</td>
        <td>67</td>
    </tr>
    <tr>
        <td>Bo</td>
        <td>Nilson</td>
        <td>35</td>
    </tr>
    <tr class="green">
        <td>Jill</td>
        <td>Smith</td>
        <td>50</td>
    </tr>
    <tr>
        <td>Eve</td>
        <td>Jackson</td>
        <td>94</td>
    </tr>
    <tr class="green">
        <td>Adam</td>
        <td>Johnson</td>
        <td>67</td>
    </tr>
    <tr>
        <td>Bo</td>
        <td>Nilson</td>
        <td>35</td>
    </tr>
</table>

</body>
</html>
